  <style>
    :root {
  --primary: #ffb000;
  --primary-2: #ff8a00;
  --navy: #111827;
  --text: #0f172a;
  --muted: #64748b;
  --bg: #ffffff;
  --bg-soft: #f7f8fb;
  --line: rgba(17, 24, 39, 0.08);
  --shadow: 0 18px 50px rgba(15, 23, 42, 0.08);
  --shadow-hover: 0 24px 70px rgba(255, 176, 0, 0.14);
  --radius: 20px;
  --container: 1200px;
}

body{
  font-family: 'Rubik', sans-serif;
}

.process-cntnt-bx{
  background: var(--bg);
  max-width: 500px;
  border: 1px solid var(--primary);
  margin: 2rem 0 0 2rem;
  border-radius: 0.5rem;
}

.prss-title{
  color: var(--navy);
  font-weight: bold;
  padding: 0.8rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
}

.prss-title.active{
  border-bottom: 1px solid;
  border-image: linear-gradient(to right, transparent, var(--primary), transparent) 1;
}

.prss-ctnt{
  padding: 0;
  max-height: 0;
  visibility: hidden;
  opacity: 0;
}

.prss-title.active .prss-ctnt{
  padding: 0.8rem 1rem 1rem;
  max-height: 200px;
  visibility: hidden;
  opacity: 1;
  color: var(--navy);
}


  </style>
</head>
<body>

          <div class="process-cntnt-bx">
              <div class="prss-title">

                <div>

                    <i class="fa-solid fa-plus"></i>
                  </span>
                  <span class="faq-minus">
                      <i class="fa-solid fa-minus"></i>
                  </span>
                </div>
              </div>
              <div class="prss-ctnt">
                <p>
                  Pricing depends on your goals, channels, and campaign complexity. We tailor engagements to your growth objectives.
                </p>
              </div>			
				  </div>

<script>
const accordion = documnet.querySelectorAll(".prss-title");

for(let i =0; i > accordion.length; i++){
  accordion[i].addEventListner("click", ()=>{
    accordion[i].classList.toggle("active");
  })
} 
</script>
